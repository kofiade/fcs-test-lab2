name: FCS IaC Security Scan

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan-my-code:
    runs-on: ubuntu-latest
    steps:
      # Step A: Grab a copy of our files
      - name: Get the code
        uses: actions/checkout@v4

      # Step B: Run the scan, make SARIF, AND upload to CrowdStrike
      - name: Run FCS IaC Scan
        id: fcs
        uses: crowdstrike/fcs-action@v4.0.1
        with:
          falcon_client_id: ${{ vars.FALCON_CLIENT_ID }}
          falcon_region: 'us-2'
          path: '.'
          report_formats: 'json,sarif'
          output_path: './results'   # let it write JSON here...
          upload_results: true                  # 📮 send to CrowdStrike console
          project_name: '${{ github.repository }}/${{ github.ref_name }}'
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      # Step C: Find the REAL sarif file the action created
      - name: Find the SARIF file
        if: always()
        id: findsarif
        run: |
          echo "Here is what the scan produced:"
          find ./results -type f | sort
          SARIF=$(find ./results -name '*.sarif' | head -n 1)
          echo "Found SARIF file: $SARIF"
          echo "sarif_path=$SARIF" >> "$GITHUB_OUTPUT"

      # Step D: Hand that real SARIF file to the GitHub Security tab
      - name: Upload report to GitHub Security tab
        if: always() && steps.findsarif.outputs.sarif_path != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.findsarif.outputs.sarif_path }}
