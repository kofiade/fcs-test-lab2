name: FCS IaC Security Scan

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan-my-code:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Run FCS IaC Scan
        id: fcs
        uses: crowdstrike/fcs-action@v4.0.1
        with:
          falcon_client_id: ${{ vars.FALCON_CLIENT_ID }}
          falcon_region: 'us-2'          # keep YOUR working region here
          path: '.'
          report_formats: 'sarif'
          output_path: './results/scan.sarif'   # <- end in .sarif this time
          upload_results: true
          project_name: '${{ github.repository }}/${{ github.ref_name }}'
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: Find the SARIF file
        if: always()
        id: findsarif
        run: |
          echo "===== ALL .json and .sarif files anywhere in the workspace ====="
          find "$GITHUB_WORKSPACE" \( -name '*.sarif' -o -name '*.json' \) -type f 2>/dev/null | sort
          echo "===== also checking /tmp ====="
          find /tmp -name '*.sarif' -type f 2>/dev/null | sort
          echo "==============================================================="
          SARIF=$(find "$GITHUB_WORKSPACE" -name '*.sarif' -type f 2>/dev/null | head -n 1)
          echo "Chosen SARIF file: '$SARIF'"
          echo "sarif_path=$SARIF" >> "$GITHUB_OUTPUT"

      - name: Upload report to GitHub Security tab
        if: always() && steps.findsarif.outputs.sarif_path != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.findsarif.outputs.sarif_path }}
