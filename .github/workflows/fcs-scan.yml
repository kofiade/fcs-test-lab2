name: FCS IaC Security Scan

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan-my-code:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Run FCS IaC Scan
        id: fcs
        uses: crowdstrike/fcs-action@v4.0.1
        with:
          falcon_client_id: ${{ vars.FALCON_CLIENT_ID }}
          falcon_region: 'us-2'                 # keep YOUR working region
          path: '.'
          report_formats: 'sarif'               # ask for SARIF -> converter runs
          output_path: './scan-results/'        # DIRECTORY (trailing slash!)
          upload_results: true                  # 📮 also sends to CrowdStrike
          project_name: '${{ github.repository }}/${{ github.ref_name }}'
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      # Find the .sarif file the action created inside the directorys
      - name: Locate SARIF file
        if: always()
        id: findsarif
        run: |
          echo "Files produced:"
          find ./scan-results -type f | sort
          SARIF=$(find ./scan-results -name '*.sarif' -type f | head -n 1)
          echo "SARIF file: '$SARIF'"
          echo "sarif_path=$SARIF" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF to GitHub Security tab
        if: always() && steps.findsarif.outputs.sarif_path != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.findsarif.outputs.sarif_path }}
